
name: Actualisation Automatique du Radar inter

on:
  schedule:
    - cron: '*/30 * * * *'  # S'exécute toutes les 30 minutes
  workflow_dispatch:        # Permet un déclenchement manuel pour tester

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Récupération du code source
      uses: actions/checkout@v4

    - name: Installation de Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Installation des dépendances
      run: |
        python -m pip install --upgrade pip
        pip install requests

    - name: Exécution du récupérateur allemand
      run: python recuperateur_europe.py

    - name: Sauvegarde et déploiement du fichier JSON sur GitHub
      run: |
        git config --local user.email "actions@github.com"
        git config --local user.name "GitHub Actions"
        git add stations_allemagne.json
        git diff --quiet && git diff --staged --quiet || (git commit -m "🛰️ Radar : Mise à jour des prix transfrontaliers [Allemagne]" && git push)
