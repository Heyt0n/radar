name: Actualisation Automatique du Radar

on:
  schedule:
    # ⏱️ On demande un réveil toutes les 30 minutes (M30)
    - cron: '*/30 * * * *'
  workflow_dispatch: # 🎯 Garde ce bouton actif pour déclencher à la main quand tu veux !

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Récupération du code source
      uses: actions/checkout@v4

    - name: Installation de Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Installation des dépendances
      run: |
        python -m pip install --upgrade pip
        # 🔥 CRITIQUE : On installe requests ET supabase pour que le script python ne crash pas !
        pip install requests supabase

    - name: Exécution du script de compression et d'historique
      # ⚠️ Attention : Remplace "compress_data.py" par le nom exact de ton fichier python actuel s'il a changé
      run: python compress_data.py

    - name: Sauvegarde et déploiement du fichier JSON sur GitHub
      run: |
        git config --local user.email "actions@github.com"
        git config --local user.name "GitHub Actions"
        git add stations_france.json
        git diff --quiet && git diff --staged --quiet || (git commit -m "🛰️ Radar : Mise à jour automatique des prix et Supabase" && git push)
