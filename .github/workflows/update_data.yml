name: Actualisation Automatique du Radar

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch: 

# ICI : On donne explicitement le droit d'écrire et de pousser des fichiers
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Récupération du code source
      uses: actions/checkout@v4

    - name: Installation de Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Installation des dépendances
      run: |
        python -m pip install --upgrade pip
        pip install requests

    - name: Exécution du script de compression
      run: python compress_data.py

    - name: Sauvegarde et déploiement du fichier JSON sur GitHub
      run: |
        git config --local user.email "actions@github.com"
        git config --local user.name "GitHub Actions"
        git add stations_france.json
        # Le script vérifie s'il y a des changements avant de push pour éviter de faire des commits vides
        git diff --quiet && git diff --staged --quiet || (git commit -m "🛰️ Radar : Mise à jour automatique des prix" && git push)
