<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Radar Carburant - Outils & Statistiques</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-principal: #0b0f19;
            --bg-panneau: #111827;
            --accent-bleu: #3b82f6;
            --accent-vert: #22c55e;
            --texte-principal: #f3f4f6;
            --texte-secondaire: #9ca3af;
        }
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; background-color: var(--bg-principal); color: var(--texte-principal); font-family: 'Plus Jakarta Sans', sans-serif; }
        * { box-sizing: border-box; }
        header { background-color: var(--bg-panneau); padding: 0 20px; border-bottom: 1px solid #1f2937; display: flex; justify-content: space-between; align-items: center; height: 50px; }
        header h1 { font-size: 16px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; }
        .burger-btn { background: none; border: none; color: var(--texte-principal); font-size: 24px; cursor: pointer; padding: 5px; z-index: 1100; }
        
        .burger-menu { position: fixed; top: 0; right: -280px; width: 280px; height: 100%; background-color: var(--bg-panneau); border-left: 1px solid #1f2937; box-shadow: -5px 0 25px rgba(0,0,0,0.5); z-index: 2000; transition: right 0.3s ease; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .burger-menu.open { right: 0; }
        .menu-user-header { padding-top: 50px; padding-bottom: 15px; border-bottom: 1px solid #1f2937; margin-bottom: 10px; }
        .menu-user-status { font-size: 10px; text-transform: uppercase; color: var(--accent-vert); font-weight: 700; }
        .menu-link { background: #1f2937; color: var(--texte-principal); border: 1px solid #374151; padding: 14px; border-radius: 8px; text-align: left; font-weight: 600; font-size: 14px; text-decoration: none; display: flex; align-items: center; gap: 10px; }
        .menu-link.active { background: var(--accent-bleu); border-color: var(--accent-bleu); }
        .menu-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0, 0, 0, 0.6); z-index: 999; }
        .menu-overlay.active { display: block; }

        .content { padding: 20px; max-width: 800px; margin: 0 auto; display: flex; flex-direction: column; gap: 20px; }
        .widget { background: #111827; border: 1px solid #374151; border-radius: 12px; padding: 20px; }
        .widget-title { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: var(--texte-secondaire); margin-bottom: 12px; font-weight: 700; }
        
        #select-station-outils { background: #1f2937; color: white; border: 1px solid #374151; padding: 12px; border-radius: 8px; width: 100%; font-weight: bold; cursor: pointer; font-size: 14px; margin-bottom: 10px; }
        .chart-container { height: 300px; position: relative; width: 100%; }
        .burger-btn {
        background: none;
        border: none;
        color: var(--texte-principal);
        font-size: 28px; /* Plus grand pour le pouce sur mobile */
        cursor: pointer;
        padding: 10px;   /* Zone de clic élargie */
        position: relative;
        z-index: 9999 !important; /* Force le bouton à rester au-dessus sur mobile */
        -webkit-tap-highlight-color: transparent;
    </style>
</head>
<body>

    <div class="menu-overlay" id="menuOverlay" onclick="toggleBurgerMenu()"></div>
    
    <nav class="burger-menu" id="burgerMenu">
        <div class="menu-user-header">
            <span class="menu-user-status">📡 Système Connecté</span>
            <div class="menu-user-greeting" style="font-size:15px; color:var(--texte-secondaire);">Bonjour, <span id="nom-operateur" style="color:white; font-weight:800;">Opérateur</span></div>
        </div>
        <a href="index.html" class="menu-link">📡 Radar Tactique</a>
        <a href="outils.html" class="menu-link active">📊 Outils & Stats</a>
        <a href="compte.html" class="menu-link">👤 Mon Compte</a>
    </nav>

    <header>
        <h1>Outils & Statistiques</h1>
        <button class="burger-btn" onclick="toggleBurgerMenu()">☰</button>
    </header>

    <div class="content">
        <div class="widget">
            <div class="widget-title">🎯 Sélection de la station cible</div>
            <select id="select-station-outils">
                <option value="" selected disabled>-- Chargement des favoris... --</option>
            </select>
        </div>

        <div class="widget">
            <div class="widget-title">📊 Évolution & Prévisions Algorithmiques (Horizon J+5)</div>
            <div class="chart-container">
                <canvas id="graphiquePrevisionnel"></canvas>
            </div>
        </div>
    </div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom@2.0.1"></script>
    
    <script src="outils.js"></script>
</body>
</html>
