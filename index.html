<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Radar Carburant - Système Tactique</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-principal: #0b0f19;
            --bg-panneau: #111827;
            --bg-carte: #1f2937;
            --accent-vert: #22c55e;
            --accent-bleu: #3b82f6;
            --texte-principal: #f3f4f6;
            --texte-secondaire: #9ca3af;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-principal);
            color: var(--texte-principal);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* HEADER */
        header {
            background-color: var(--bg-panneau);
            padding: 0 20px;
            border-bottom: 1px solid #1f2937;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
            height: 50px;
            flex-shrink: 0;
        }

        header h1 { font-size: 16px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; }

        /* BOUTON BURGER ☰ */
        .burger-btn {
            background: none;
            border: none;
            color: var(--texte-principal);
            font-size: 24px;
            cursor: pointer;
            z-index: 1100;
            padding: 5px;
        }

        /* MENU BURGER COULISSANT */
           .burger-menu {
    position: fixed;
    top: 0;
    right: -280px;
    width: 280px;
    height: 100%;
    background-color: var(--bg-panneau);
    border-left: 1px solid #1f2937;
    box-shadow: -5px 0 25px rgba(0,0,0,0.5);
    z-index: 2000; /* <-- Augmenté de 1000 à 2000 pour passer devant Leaflet */
    transition: right 0.3s ease;
    padding: 70px 20px 20px 20px;
    display: flex;
    flex-direction: column;
    gap: 10px;
}

        .burger-menu.open { right: 0; }

        /* VOILE SOMBRE DE FOND */
        .menu-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.6);
            z-index: 999;
        }
        .menu-overlay.active { display: block; }

        /* LIENS DU MENU */
        .menu-link {
            background: #1f2937;
            color: var(--texte-principal);
            border: 1px solid #374151;
            padding: 14px;
            border-radius: 8px;
            text-align: left;
            font-weight: 600;
            font-size: 14px;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
        }
        .menu-link.active { background: var(--accent-bleu); border-color: var(--accent-bleu); }

        /* CONTENEUR GLOBAL APP */
        .app-container {
            display: flex;
            flex: 1;
            width: 100%;
            height: calc(100vh - 50px);
            flex-direction: row;
        }

        /* PANNEAU LATÉRAL GAUCHE */
        #sidebar {
            width: 320px;
            background-color: var(--bg-panneau);
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            overflow-y: auto;
            border-right: 1px solid #1f2937;
            z-index: 5;
            flex-shrink: 0;
        }

        .widget { background: rgba(31, 41, 55, 0.5); border: 1px solid #374151; border-radius: 12px; padding: 14px; }
        .widget-title { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: var(--texte-secondaire); margin-bottom: 8px; font-weight: 600; }
        
        #select-carburant { background: #1f2937; color: white; border: 1px solid #374151; padding: 10px; border-radius: 8px; width: 100%; font-weight: bold; cursor: pointer; font-size: 14px; }
        #sniper-comment { font-size: 13px; line-height: 1.5; color: #d1d5db; font-style: italic; }
        #liste-favoris { display: flex; flex-direction: column; gap: 8px; font-size: 12px; }

        .favori-item {
            background: #1f2937; padding: 10px; border-radius: 8px; border-left: 3px solid var(--accent-vert);
            display: flex; justify-content: space-between; align-items: center;
        }

        /* ZONE CARTE */
        #map-container { flex: 1; height: 100%; position: relative; }
        #map { width: 100%; height: 100%; position: absolute; top: 0; bottom: 0; left: 0; right: 0; }

        /* MULTI-ECRANS SMARTPHONE */
        @media (max-width: 768px) {
            body { position: fixed; width: 100%; }
            .app-container { flex-direction: column-reverse; }
            #sidebar { width: 100%; height: auto; max-height: 45vh; border-right: none; border-top: 1px solid #1f2937; padding: 12px; gap: 10px; }
            #map-container { flex: 1; }
        }
    </style>
</head>
<body>

    <div class="menu-overlay" id="menuOverlay" onclick="toggleBurgerMenu()"></div>
    <nav class="burger-menu" id="burgerMenu">
        <a href="index.html" class="menu-link active">📡 Radar Tactique</a>
        <a href="outils.html" class="menu-link">📊 Outils & Stats</a>
        <a href="compte.html" class="menu-link">👤 Mon Compte</a>
    </nav>

    <header>
        <h1>Radar Carburant</h1>
        <button class="burger-btn" onclick="toggleBurgerMenu()">☰</button>
    </header>

    <div class="app-container">
        <aside id="sidebar">
            
            <select id="select-carburant">
                <option value="gz">⛽ Gazole</option>
                <option value="e10">⛽ SP95-E10</option>
                <option value="95">⛽ SP95</option>
                <option value="98">⛽ SP98</option>
            </select>
            
            <div class="widget">
                <div class="widget-title">Cible / Localisation</div>
                <div style="display: flex; gap: 8px; margin-bottom: 8px;">
                    <input type="text" id="search-ville" placeholder="Ex: Bordeaux, Haguenau..." style="flex: 1; background: #1f2937; color: white; border: 1px solid #374151; padding: 8px; border-radius: 6px; font-size: 13px;">
                    <button id="btn-search" style="background: var(--accent-bleu); color: white; border: none; padding: 8px 12px; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 13px;">🔍</button>
                </div>
                <button id="btn-reset" style="width: 100%; background: #374151; color: #9ca3af; border: 1px solid #4b5563; padding: 8px; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 11px; text-transform: uppercase;">📍 Retour Ma Position</button>
            </div>

            <div class="widget">
                <div class="widget-title">Briefing Analyste</div>
                <div id="sniper-comment">En attente de synchronisation...</div>
            </div>
            
            <div class="widget" style="flex: 1;">
                <div class="widget-title">Stations Favorites</div>
                <div id="liste-favoris">
                    <p style="font-size: 11px; color: var(--texte-secondaire); text-align: center; font-style: italic;">Aucune station en favori.</p>
                </div>
            </div>
        </aside>

        <main id="map-container">
            <div id="map"></div>
        </main>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="script.js"></script>
    <script src="https://vyrnkiedotmwrzoigziq.supabase.co/rest/v1/"></script>
    
    <script src="supabase-config.js"></script>
    
    <script src="connexion.js"></script>

    
</body>
</html>
