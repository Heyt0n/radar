<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Radar Carburant - Système Tactique</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-principal: #0b0f19;
            --bg-panneau: #111827;
            --bg-carte: #1f2937;
            --accent-vert: #22c55e;
            --accent-bleu: #3b82f6;
            --texte-principal: #f3f4f6;
            --texte-secondaire: #9ca3af;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-principal);
            color: var(--texte-principal);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* HEADER */
        header {
            background-color: var(--bg-panneau);
            padding: 0 20px;
            border-bottom: 1px solid #1f2937;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
            height: 50px;
            flex-shrink: 0;
        }

        header h1 { font-size: 16px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; }

        /* BOUTON BURGER ☰ */
        .burger-btn {
            background: none;
            border: none;
            color: var(--texte-principal);
            font-size: 24px;
            cursor: pointer;
            z-index: 1100;
            padding: 5px;
        }

        /* VOLET COULISSANT (MENU BURGER) */
        .burger-menu {
            position: fixed;
            top: 0;
            right: -280px; /* Caché à droite par défaut */
            width: 280px;
            height: 100%;
            background-color: var(--bg-panneau);
            border-left: 1px solid #1f2937;
            box-shadow: -5px 0 25px rgba(0,0,0,0.5);
            z-index: 1000;
            transition: right 0.3s ease; /* Animation de glisse */
            padding: 70px 20px 20px 20px; /* Espace en haut pour ne pas cacher le bouton */
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .burger-menu.open {
            right: 0; /* Glisse à l'écran */
        }

        /* VOILE SOMBRE DE FOND */
        .menu-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.6);
            z-index: 999;
        }
        .menu-overlay.active { display: block; }

        /* LIENS DU MENU */
        .menu-link {
            background: #1f2937;
            color: var(--texte-principal);
            border: 1px solid #374151;
            padding: 14px;
            border-radius: 8px;
            text-align: left;
            font-weight: 600;
            font-size: 14px;
            text-decoration: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .menu-link.active { background: var(--accent-bleu); border-color: var(--accent-bleu); }

        /* STRUCTURE PAGE CARTE */
        .app-container {
            display: flex;
            flex: 1;
            width: 100%;
            height: calc(100vh - 50px);
            flex-direction: row;
        }

        #sidebar {
            width: 320px;
            background-color: var(--bg-panneau);
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            overflow-y: auto;
            border-right: 1px solid #1f2937;
            z-index: 5;
            flex-shrink: 0;
        }

        .widget { background: rgba(31, 41, 55, 0.5); border: 1px solid #374151; border-radius: 12px; padding: 14px; }
        .widget-title { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: var(--texte-secondaire); margin-bottom: 8px; font-weight: 600; }
        
        #select-carburant { background: #1f2937; color: white; border: 1px solid #374151; padding: 10px; border-radius: 8px; width: 100%; font-weight: bold; cursor: pointer; }
        #sniper-comment { font-size: 13px; line-height: 1.5; color: #d1d5db; font-style: italic; }
        #liste-favoris { display: flex; flex-direction: column; gap: 8px; font-size: 12px; }

        .favori-item {
            background: #1f2937; padding: 10px; border-radius: 8px; border-left: 3px solid var(--accent-vert);
            display: flex; justify-content: space-between; align-items: center;
        }

        #map-container { flex: 1; height: 100%; position: relative; }
        #map { width: 100%; height: 100%; position: absolute; top: 0; bottom: 0; left: 0; right: 0; }

        @media (max-width: 768px) {
            body { position: fixed; width: 100%; }
            .app-container { flex-direction: column-reverse; }
            #sidebar { width: 100%; height: auto; max-height: 45vh; border-right: none; border-top: 1px solid #1f2937; padding: 12px; gap: 10px; }
            #map-container { flex: 1; }
        }
    </style>
</head>
