<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Radar Carburant</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-principal: #0b0f19;
            --bg-panneau: #111827;
            --bg-carte: #1f2937;
            --accent-vert: #22c55e;
            --accent-bleu: #3b82f6;
            --accent-rouge: #ef4444;
            --texte-principal: #f3f4f6;
            --texte-secondaire: #9ca3af;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-principal);
            color: var(--texte-principal);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: fixed;
            width: 100%;
        }

        /* BARRE SUPÉRIEURE CONSTANTE */
        header {
            background-color: var(--bg-panneau);
            height: 50px;
            padding: 0 15px;
            border-bottom: 1px solid #1f2937;
            display: flex;
            align-items: center;
            gap: 15px;
            z-index: 100;
            flex-shrink: 0;
        }

        /* Bouton Menu Burger ☰ */
        #menu-toggle {
            background: none;
            border: none;
            color: var(--texte-principal);
            font-size: 22px;
            cursor: pointer;
            padding: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        header h1 {
            font-size: 15px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* STRUCTURE GLOBALE DE CONTENU */
        .main-container {
            flex: 1;
            display: flex;
            position: relative;
            height: calc(100vh - 50px);
            overflow: hidden;
        }

        /* LE MENU DÉROULANT LATÉRAL (STYLE GEMINI) */
        #sidebar {
            position: absolute;
            top: 0;
            left: -300px; /* Caché à gauche par défaut */
            width: 300px;
            height: 100%;
            background-color: var(--bg-panneau);
            border-right: 1px solid #1f2937;
            z-index: 1000;
            transition: left 0.3s ease; /* Animation fluide de glissement */
            display: flex;
            flex-direction: column;
            padding: 20px;
            gap: 15px;
        }

        #sidebar.open {
            left: 0; /* S'ouvre quand on clique */
        }

        /* Voile noir transparent quand le menu est ouvert */
        #sidebar-overlay {
            display: none;
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 999;
        }

        #sidebar-overlay.active {
            display: block;
        }

        /* BOUTONS DE NAVIGATION DANS LE MENU */
        .menu-nav-links {
            display: flex;
            flex-direction: column;
            gap: 8px;
            border-bottom: 1px solid #1f2937;
            padding-bottom: 15px;
        }

        .menu-link {
            background: #1f2937;
            color: var(--texte-principal);
            border: 1px solid #374151;
            padding: 12px;
            border-radius: 8px;
            text-align: left;
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .menu-link.active {
            background: var(--accent-bleu);
            border-color: var(--accent-bleu);
        }

        /* CONTENU DES PAGES (ZONES INTERNES) */
        .page-content {
            display: none;
            width: 100%;
            height: 100%;
            overflow-y: auto; /* Active le défilement propre à l'intérieur de la page */
            -webkit-overflow-scrolling: touch;
        }

        .page-content.active {
            display: block;
        }

        /* CONFIGURATION SPÉCIFIQUE DE LA CARTE */
        #page-map {
            position: relative;
            overflow: hidden;
        }

        #map {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0; left: 0;
        }

        /* COMPOSANTS STANDARDS RE-STYLISÉS */
        .widget {
            background: rgba(31, 41, 55, 0.5);
            border: 1px solid #374151;
            border-radius: 12px;
            padding: 15px;
        }

        .widget-title {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--texte-secondaire);
            margin-bottom: 8px;
            font-weight: 600;
        }

        #liste-favoris {
            display: flex;
            flex-direction: column;
            gap: 8px;
            overflow-y: auto;
            flex: 1; /* Prend toute la place restante dans le menu coulissant */
        }

        .favori-item {
            background: #1f2937;
            padding: 10px;
            border-radius: 8px;
            border-left: 3px solid var(--accent-vert);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .standard-page {
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            max-width: 600px;
            margin: 0 auto;
        }
    </style>
</head>
<body>

    <header>
        <button id="menu-toggle" onclick="toggleMenu()">☰</button>
        <h1>Radar Carburant</h1>
    </header>

    <div class="main-container">
        <div id="sidebar-overlay" onclick="toggleMenu()"></div>

        <aside id="sidebar">
            <div class="widget-title" style="margin-bottom: 5px;">Navigation Système</div>
            <nav class="menu-nav-links">
                <button class="menu-link active" onclick="changerPage('page-map')">📡 Radar Tactique</button>
                <button class="menu-link" onclick="changerPage('page-outils')">📊 Outils & Stats</button>
                <button class="menu-link" onclick="changerPage('page-compte')">👤 Mon Compte</button>
            </nav>

            <div class="widget">
                <div class="widget-title">Cible / Localisation</div>
                <div style="display: flex; gap: 6px; margin-bottom: 6px;">
                    <input type="text" id="search-ville" placeholder="Ex: Bordeaux..." style="flex: 1; background: #1f2937; color: white; border: 1px solid #374151; padding: 8px; border-radius: 6px; font-size: 12px;">
                    <button id="btn-search" style="background: var(--accent-bleu); color: white; border: none; padding: 8px 10px; border-radius: 6px; cursor: pointer; font-size: 12px;">🔍</button>
                </div>
                <button id="btn-reset" style="width: 100%; background: #374151; color: #9ca3af; border: 1px solid #4b5563; padding: 6px; border-radius: 6px; cursor: pointer; font-size: 10px; text-transform: uppercase;">📍 Ma Position</button>
            </div>

            <select id="select-carburant" style="background:#1f2937; color:white; border:1px solid #374151; padding:10px; border-radius:8px; width:100%; font-weight:bold; cursor:pointer; font-size: 13px;">
                <option value="gz">⛽ Gazole</option>
                <option value="e10">⛽ SP95-E10</option>
                <option value="95">⛽ SP95</option>
                <option value="98">⛽ SP98</option>
            </select>

            <div class="widget" style="flex: 1; display: flex; flex-direction: column; min-height: 150px;">
                <div class="widget-title">Vos Favoris</div>
                <div id="liste-favoris">
                    <p style="font-size: 11px; color: var(--texte-secondaire); text-align: center; font-style: italic; margin-top: 10px;">Aucun favori enregistré.</p>
                </div>
            </div>
        </aside>

        <div id="page-map" class="page-content active">
            <div id="map"></div>
        </div>

        <div id="page-outils" class="page-content">
            <div class="standard-page">
                <div class="widget">
                    <h2 style="font-size: 16px; margin-bottom: 10px; color: var(--accent-bleu);">📊 Outils Analytiques</h2>
                    <p style="font-size: 13px; color: var(--texte-secondaire); line-height: 1.5;">
                        Les graphiques d'évolution des prix et le planificateur de road-trip seront injectés ici.
                    </p>
                </div>
                <div class="widget" style="height: 400px; display: flex; align-items: center; justify-content: center; border-style: dashed;">
                    <span style="color: var(--texte-secondaire);">[Zone Graphique Futur]</span>
                </div>
                <div class="widget" style="height: 400px; display: flex; align-items: center; justify-content: center; border-style: dashed;">
                    <span style="color: var(--texte-secondaire);">[Zone Historique Prix]</span>
                </div>
            </div>
        </div>

        <div id="page-compte" class="page-content">
            <div class="standard-page">
                <div class="widget">
                    <h2 style="font-size: 16px; margin-bottom: 10px;">👤 Profil Opérateur</h2>
                    <div style="background: #1f2937; padding: 12px; border-radius: 8px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center;">
                        <span style="font-size: 12px; color: var(--accent-vert); font-weight: bold;">Accès Démo</span>
                        <span style="background: rgba(34, 197, 94, 0.15); color: var(--accent-vert); padding: 3px 6px; border-radius: 4px; font-size: 10px; font-weight: bold;">STANDBY</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="script.js"></script>
</body>
</html>
