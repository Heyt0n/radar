<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radar Carburant - Dashboard Sniper</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0b0f19;
            color: #f3f4f6;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        #sidebar {
            width: 350px;
            background-color: #111827;
            padding: 20px;
            box-shadow: 4px 0 15px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            gap: 20px;
            z-index: 10;
            border-right: 1px solid #1f2937;
        }

        #map {
            flex: 1;
            height: 100%;
        }

        .card {
            background-color: #1f2937;
            padding: 20px;
            border-radius: 12px;
            border: 1px solid #374151;
        }

        h2, h3 {
            margin-top: 0;
            color: #22c55e;
            text-transform: uppercase;
            font-size: 14px;
            letter-spacing: 1px;
        }

        .status-box {
            text-align: center;
            padding: 15px;
            background: #111827;
            border-radius: 8px;
            font-size: 24px;
            font-weight: 900;
            margin-top: 10px;
        }

        .data-line {
            display: flex;
            justify-content: space-between;
            margin-top: 8px;
            font-family: monospace;
            font-size: 14px;
        }

        .comment-box {
            background: #111827;
            padding: 12px;
            border-radius: 8px;
            font-size: 13px;
            color: #9ca3af;
            font-style: italic;
            line-height: 1.4;
            min-height: 50px;
        }
    </style>
</head>
<body>

    <div id="sidebar">
        <div style="text-align:center; padding-bottom:10px; border-bottom:1px solid #1f2937;">
            <h1 style="font-size:20px; margin:0; color:#fff; font-weight:800;">🛰️ RADAR CARBURANT</h1>
            <span style="font-size:10px; color:#6b7280; tracking:2px;">LIVE ANALYSIS MODE</span>
        </div>

        <div class="card">
            <h3>🎯 Timing de Plein</h3>
            <div id="timer-display" class="status-box" style="color: #6b7280;">
                <span id="status-icon">⏳</span> EN ATTENTE
            </div>
        </div>

        <div class="card">
            <h3>💬 L'Analyse du Sniper</h3>
            <div id="sniper-comment" class="comment-box">Connexion au Google Sheets...</div>
            
            <div style="margin-top:15px; border-top:1px solid #374151; padding-top:10px;">
                <div class="data-line"><span>Brent :</span><span id="val-brent" style="color:#fff;">--</span></div>
                <div class="data-line"><span>Marge :</span><span id="val-marge" style="color:#fff;">--</span></div>
            </div>
        </div>

        <div style="margin-top:auto; font-size:11px; color:#4b5563; text-align:center;">
            RadarSniper v2.0 &copy; 2026
        </div>
    </div>

    <div id="map"></div>

    <script src="script.js"></script>
</body>
</html>
