<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radar Carburant - Profil</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-principal: #0b0f19;
            --bg-panneau: #111827;
            --accent-vert: #22c55e;
            --accent-bleu: #3b82f6;
            --texte-principal: #f3f4f6;
            --texte-secondaire: #9ca3af;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--bg-principal); color: var(--texte-principal); min-height: 100vh; }
        
        header {
            background-color: var(--bg-panneau); padding: 0 20px; border-bottom: 1px solid #1f2937;
            display: flex; justify-content: space-between; align-items: center; height: 50px; z-index: 100; position: relative;
        }
        header h1 { font-size: 16px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; }
        
        .burger-btn { background: none; border: none; color: var(--texte-principal); font-size: 24px; cursor: pointer; z-index: 1100; padding: 5px; }
        
        .burger-menu {
            position: fixed; top: 0; right: -280px; width: 280px; height: 100%; background-color: var(--bg-panneau);
            border-left: 1px solid #1f2937; box-shadow: -5px 0 25px rgba(0,0,0,0.5); z-index: 1000;
            transition: right 0.3s ease; padding: 70px 20px 20px 20px; display: flex; flex-direction: column; gap: 10px;
        }
        .burger-menu.open { right: 0; }
        
        .menu-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0, 0, 0, 0.6); z-index: 999; }
        .menu-overlay.active { display: block; }
        
        .menu-link {
            background: #1f2937; color: var(--texte-principal); border: 1px solid #374151; padding: 14px;
            border-radius: 8px; text-align: left; font-weight: 600; font-size: 14px; text-decoration: none; display: flex; align-items: center; gap: 10px;
        }
        .menu-link.active { background: var(--accent-bleu); border-color: var(--accent-bleu); }
        
        .standard-page { padding: 30px; width: 100%; max-width: 600px; margin: 0 auto; display: flex; flex-direction: column; gap: 20px; }
        .widget { background: var(--bg-panneau); border: 1px solid #374151; border-radius: 12px; padding: 20px; }
    </style>
</head>
<body>

    <div class="menu-overlay" id="menuOverlay" onclick="toggleBurgerMenu()"></div>
    <nav class="burger-menu" id="burgerMenu">
        <a href="index.html" class="menu-link">📡 Radar Tactique</a>
        <a href="outils.html" class="menu-link">📊 Outils & Stats</a>
        <a href="compte.html" class="menu-link active">👤 Mon Compte</a>
    </nav>

    <header>
        <h1>Radar Carburant</h1>
        <button class="burger-btn" onclick="toggleBurgerMenu()">☰</button>
    </header>

    <div class="standard-page">
        <div class="widget">
            <h2 style="font-size: 18px; margin-bottom: 5px;">👤 Profil de l'Opérateur</h2>
            <p style="font-size: 12px; color: var(--texte-secondaire); text-transform: uppercase; margin-bottom: 20px;">Gestion de votre accès</p>
            
            <div style="background: #1f2937; padding: 15px; border-radius: 8px; margin-bottom: 15px;">
                <span style="display: block; font-size: 11px; color: var(--texte-secondaire); margin-bottom: 4px;">Statut actuel</span>
                <b style="color: var(--accent-vert);">Compte Invité (Local)</b>
            </div>
            
            <p style="font-size: 13px; color: var(--texte-secondaire); line-height: 1.5;">
                C'est ici qu'on viendra brancher le formulaire de connexion et le futur bouton pour s'abonner.
            </p>
        </div>
    </div>

    <script>
        // Script local ultra-léger dédié uniquement à la bascule du menu
        function toggleBurgerMenu() {
            document.getElementById('burgerMenu').classList.toggle('open');
            document.getElementById('menuOverlay').classList.toggle('active');
        }
    </script>
</body>
</html>
