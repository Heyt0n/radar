<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radar Carburant - Calcul d'Itinéraire</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="style.css">
    <style>
        .ecran-trajet {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        .barre-recherche-trajet {
            background: #1f2937;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            z-index: 1000;
        }
        .inputs-trajet {
            display: flex;
            gap: 10px;
        }
        .inputs-trajet > div {
            flex: 1;
        }
        .inputs-trajet input {
            width: 100%;
            background: #374151;
            border: 1px solid #4b5563;
            color: white;
            padding: 10px;
            border-radius: 8px;
            font-size: 14px;
            box-sizing: border-box;
        }
        .btn-calculer {
            background: #2563eb;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-calculer:hover { background: #1d4ed8; }
        
        .zone-contenu {
            flex: 1;
            display: flex;
            position: relative;
            overflow: hidden;
        }
        #map-trajet { flex: 1; height: 100%; }
        
        .panneau-stations {
            width: 350px;
            background: #111827;
            border-left: 1px solid #1f2937;
            display: flex;
            flex-direction: column;
            padding: 15px;
            overflow-y: auto;
        }
        
        @media (max-width: 768px) {
            .zone-contenu { flex-direction: column; }
            .panneau-stations { width: 100%; height: 40%; border-left: none; border-top: 1px solid #1f2937; }
            .inputs-trajet { flex-direction: column; gap: 8px; }
            .btn-calculer { width: 100%; padding: 12px; }
        }
    </style>
</head>
<body class="bg-slate-900 text-white m-0 p-0">

    <div class="ecran-trajet">
        <div class="barre-recherche-trajet">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <h3 style="margin:0; color:#eab308; font-size: 16px;">🗺️ FILTRE PAR ITINÉRAIRE</h3>
                <div class="burger-icon" onclick="toggleBurgerMenu()" style="cursor: pointer; font-size: 24px;">☰</div>
            </div>
            
            <div class="inputs-trajet">
                <div>
                    <input type="text" id="trajet-depart" list="suggestions-depart" placeholder="Ville de départ (ex: Gries)" autocomplete="off">
                    <datalist id="suggestions-depart"></datalist>
                </div>
                <div>
                    <input type="text" id="trajet-arrivee" list="suggestions-arrivee" placeholder="Ville d'arrivée (ex: Lauterbourg)" autocomplete="off">
                    <datalist id="suggestions-arrivee"></datalist>
                </div>
                <button class="btn-calculer" id="btn-calculer-trajet">Calculer</button>
            </div>
            
            <div style="display: flex; gap: 10px; align-items: center; margin-top: 5px; flex-wrap: wrap;">
                <label for="select-carburant-trajet" style="font-size: 12px; color: #9ca3af;">Carburant :</label>
                <select id="select-carburant-trajet" style="background:#374151; color:white; border:1px solid #4b5563; padding:5px; border-radius:6px; font-size:12px;">
                    <option value="gz">Gazole</option>
                    <option value="e10">SP95-E10</option>
                    <option value="95">SP95</option>
                    <option value="98">SP98</option>
                </select>
                <span id="trajet-statut" style="font-size: 12px; font-weight: bold;"></span>
            </div>
        </div>

        <div class="zone-contenu">
            <div id="map-trajet"></div>
            <div class="panneau-stations">
                <h4 style="margin: 0 0 10px 0; font-size: 14px; border-bottom: 1px solid #1f2937; padding-bottom: 5px; color: #9ca3af;">Stations sur le trajet (±10km)</h4>
                <div id="liste-stations-trajet" style="display: flex; flex-direction: column; gap: 10px;">
                    <p style="font-size: 12px; color: #6b7280; font-style: italic; text-align: center; margin-top: 20px;">Entrez un itinéraire pour analyser les prix.</p>
                </div>
            </div>
        </div>
    </div>

    <div id="menuOverlay" class="menu-overlay" onclick="toggleBurgerMenu()"></div>
    <div id="burgerMenu" class="burger-menu">
        <div class="close-menu" onclick="toggleBurgerMenu()">✕</div>
        <div class="menu-links">
            <a href="index.html">🌐 Radar Principal (Carte)</a>
            <a href="trajet.html" class="active">🗺️ Mode Itinéraire</a>
            <a href="outils.html">📈 Historique & Prévisions</a>
            <a href="compte.html">👤 Mon Compte</a>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="trajet.js"></script>
</body>
</html>
