<div style="display: flex; gap: 15px; align-items: center; margin-top: 5px; flex-wrap: wrap; background: #273549; padding: 10px; border-radius: 8px;">
    <div style="display: flex; gap: 5px; align-items: center;">
        <label for="select-carburant-trajet" style="font-size: 12px; color: #9ca3af;">Carburant :</label>
        <select id="select-carburant-trajet" style="background:#374151; color:white; border:1px solid #4b5563; padding:5px; border-radius:6px; font-size:12px;">
            <option value="gz">Gazole</option>
            <option value="e10">SP95-E10</option>
            <option value="95">SP95</option>
            <option value="98">SP98</option>
        </select>
    </div>

    <div style="display: flex; gap: 5px; align-items: center;">
        <label for="select-rayon-trajet" style="font-size: 12px; color: #9ca3af;">Détour max :</label>
        <select id="select-rayon-trajet" style="background:#374151; color:white; border:1px solid #4b5563; padding:5px; border-radius:6px; font-size:12px;">
            <option value="2">2 km (Autoroute)</option>
            <option value="5">5 km (Rapide)</option>
            <option value="10" selected>10 km (Standard)</option>
        </select>
    </div>

    <div style="display: flex; gap: 5px; align-items: center;">
        <label for="select-affichage-trajet" style="font-size: 12px; color: #9ca3af;">Affichage :</label>
        <select id="select-affichage-trajet" style="background:#374151; color:white; border:1px solid #4b5563; padding:5px; border-radius:6px; font-size:12px;">
            <option value="top10">Top 10 moins chères</option>
            <option value="top20">Top 20 moins chères</option>
            <option value="all">Toutes les stations</option>
        </select>
    </div>

    <span id="trajet-statut" style="font-size: 12px; font-weight: bold; margin-left: auto;"></span>
</div>
